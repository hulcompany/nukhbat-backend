$kind: collection
description: |-
  Generated from the NestJS controllers. Global prefix is /api. Success responses are wrapped as { message, data }.

  Auth: run Auth > Login first — a test script stores data.accessToken / data.refreshToken into collection variables, and every guarded request inherits Bearer {{accessToken}}.

  Roles: admin (user/manage, school/manage, curriculum/admin, public-content writes), contentWriter (curriculum/school tree, books), public (auth, files, curriculum metaData/tracks, public-content reads).
variables:
  baseUrl: http://localhost:3000
  accessToken: ""
  refreshToken: ""
auth:
  - id: ede8d1bf-4ace-4c32-9050-28d59b4e8af1
    type: bearer
    name: bearer auth
    credentials:
      token: "{{accessToken}}"
