$kind: http-request
name: Sign up
url: "{{baseUrl}}/api/auth/signUp"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "student@example1.com",
      "name" :"Ali",
      "password" : "12345678",
      "phoneNumber" : "+963949123577"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      const body = pm.response.json();
      if (body?.data?.accessToken) pm.collectionVariables.set('accessToken', body.data.accessToken);
      if (body?.data?.refreshToken) pm.collectionVariables.set('refreshToken', body.data.refreshToken);
    language: text/javascript
order: 2000
