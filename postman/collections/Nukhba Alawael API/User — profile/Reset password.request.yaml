$kind: http-request
url: "{{baseUrl}}/api/user/mine/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "code": "123456",
      "newPassword": "newPassword123",
      "confirmPassword": "newPassword123"
    }
auth:
  type: noauth
order: 6000
