$kind: http-request
description: |-
  By ids. POST rather than DELETE because DELETE bodies get dropped by some proxies.

  All-or-nothing: one undeletable question cancels the batch. Same guards as single delete.
url: "{{baseUrl}}/api/school/me/questions/bulk-delete"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "ids": [
        "00000000-0000-0000-0000-000000000000"
      ]
    }
order: 13000
