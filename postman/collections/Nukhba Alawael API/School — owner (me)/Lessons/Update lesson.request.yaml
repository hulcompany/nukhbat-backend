$kind: http-request
description: |-
  status: draft | published.

  Publishing requires the lesson to already have at least one question, and a published lesson cannot then be emptied — set it back to draft to delete its last question.
url: "{{baseUrl}}/api/curriculum/school/lessons/:id"
method: PATCH
headers:
  Content-Type: application/json
pathVariables:
  id: ""
body:
  type: json
  content: |-
    {
      "title": "New Lesson Title",
      "description": "New description",
      "status": "published"
    }
order: 3000
