<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>نخبة الأوائل — API Workbench</title>
<style>
:root {
  --bg: #0e1116;
  --panel: #151a22;
  --panel-2: #1b2230;
  --line: #242e3e;
  --line-soft: #1d2531;
  --text: #dce4f0;
  --muted: #8494ab;
  --faint: #5b6980;
  --ok: #34d399;
  --err: #f87171;
  --warn: #fbbf24;
  --accent: #7dd3fc;          /* repainted per active role */
  --accent-soft: rgba(125, 211, 252, .13);
  --mono: 'Cascadia Mono', 'Consolas', ui-monospace, monospace;
  --sans: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font: 13px/1.5 var(--sans);
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  grid-template-columns: 216px 1fr;
  grid-template-areas: "top top" "ctx ctx" "nav main" "console console";
  height: 100vh;
  overflow: hidden;
}
/* role tints */
body[data-role="admin"]         { --accent: #a78bfa; --accent-soft: rgba(167,139,250,.14); }
body[data-role="contentWriter"] { --accent: #2dd4bf; --accent-soft: rgba(45,212,191,.13); }
body[data-role="student"]       { --accent: #fbbf24; --accent-soft: rgba(251,191,36,.13); }

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, select, textarea {
  font: 12.5px/1.4 var(--mono);
  color: var(--text);
  background: #0b0e13;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 6px 8px;
  width: 100%;
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
input[type=checkbox] { width: auto; accent-color: var(--accent); }
input[type=file] { padding: 4px; font-family: var(--sans); }
textarea { resize: vertical; min-height: 72px; }
::placeholder { color: var(--faint); }

/* ---------- top bar ---------- */
#topbar {
  grid-area: top;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 14px;
  height: 52px;
  background: var(--panel);
  border-bottom: 2px solid var(--accent);   /* the role line */
}
#brand { display: flex; align-items: baseline; gap: 10px; white-space: nowrap; }
#brand .ar { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
#brand .en { font-family: var(--mono); font-size: 10px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; }

#envswitch { display: flex; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
#envswitch button { padding: 5px 12px; font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
#envswitch button.on { background: var(--accent-soft); color: var(--accent); }

#pingbtn { font-family: var(--mono); font-size: 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 7px; padding: 5px 10px; }
#pingbtn:hover { color: var(--text); }
#pingbtn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--faint); margin-right: 6px; }
#pingbtn.ok .dot { background: var(--ok); }
#pingbtn.bad .dot { background: var(--err); }

#sessions { display: flex; align-items: center; gap: 7px; margin-left: auto; overflow-x: auto; }
.chip {
  display: flex; align-items: center; gap: 7px;
  padding: 4.5px 10px;
  border: 1px solid var(--line);
  border-radius: 16px;
  white-space: nowrap;
  color: var(--muted);
  font-size: 12px;
}
.chip .rdot { width: 8px; height: 8px; border-radius: 50%; }
.chip.active { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
.chip .x { color: var(--faint); font-size: 13px; padding: 0 1px; }
.chip .x:hover { color: var(--err); }
.chip.add { border-style: dashed; }
.chip.add:hover { color: var(--text); border-color: var(--accent); }

/* ---------- context strip ---------- */
#ctxstrip {
  grid-area: ctx;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--line-soft);
  min-height: 34px;
  overflow-x: auto;
}
#ctxstrip .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--faint); text-transform: uppercase; margin-right: 4px; }
.ctxchip {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 2.5px 8px;
  white-space: nowrap;
}
.ctxchip b { color: var(--accent); font-weight: 600; }
.ctxchip span { color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.ctxchip .x { color: var(--faint); }
.ctxchip .x:hover { color: var(--err); }
#ctxstrip .empty { color: var(--faint); font-size: 11.5px; font-style: italic; }

/* ---------- nav ---------- */
#nav { grid-area: nav; overflow-y: auto; background: var(--panel); border-right: 1px solid var(--line-soft); padding: 10px 0 24px; }
#nav .group { margin-top: 14px; }
#nav .group > .gt {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--faint); padding: 0 14px 5px;
}
#nav .item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; text-align: left;
  padding: 6px 14px;
  color: var(--muted);
  border-left: 2px solid transparent;
  font-size: 12.5px;
}
#nav .item:hover { color: var(--text); }
#nav .item.on { color: var(--text); background: var(--accent-soft); border-left-color: var(--accent); }
#nav .item .who { margin-left: auto; font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: var(--faint); }

/* ---------- main ---------- */
#main { grid-area: main; overflow-y: auto; padding: 18px 22px 60px; }
.screen-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
.screen-sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
.screen-sub code, .note code, td code { font-family: var(--mono); font-size: 11px; background: var(--panel-2); padding: 1px 5px; border-radius: 4px; }

.block { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.block > .bh {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  border-bottom: 1px solid var(--line-soft);
}
.block > .bh .t { font-weight: 600; font-size: 13px; }
.block > .bh .m { font-family: var(--mono); font-size: 10.5px; color: var(--muted); }
.block > .bb { padding: 13px 14px; }
.mtag {
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .5px;
  padding: 2px 7px; border-radius: 4px;
}
.mtag.GET { color: #6ee7b7; background: rgba(110,231,183,.1); }
.mtag.POST { color: #93c5fd; background: rgba(147,197,253,.1); }
.mtag.PATCH { color: #fcd34d; background: rgba(252,211,77,.1); }
.mtag.DELETE { color: #fca5a5; background: rgba(252,165,165,.1); }

.frm { display: flex; flex-wrap: wrap; gap: 10px 12px; align-items: flex-end; }
.fld { display: flex; flex-direction: column; gap: 4px; min-width: 150px; flex: 1 1 150px; max-width: 300px; }
.fld.wide { max-width: 100%; flex-basis: 100%; }
.fld > label { font-size: 11px; color: var(--muted); }
.fld > label .req { color: var(--warn); }
.fld .hint { font-size: 10.5px; color: var(--faint); }
.fld .withbtn { display: flex; gap: 5px; }
.fld .withbtn input { flex: 1; }
.ctxbtn {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  border: 1px solid var(--line); border-radius: 6px; padding: 0 7px;
  white-space: nowrap;
}
.ctxbtn:hover { border-color: var(--accent); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid transparent;
  border-radius: 7px; padding: 6.5px 15px;
  font-weight: 600; font-size: 12.5px;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); }
.btn.ghost { background: none; border: 1px solid var(--line); color: var(--muted); font-weight: 400; }
.btn.ghost:hover { color: var(--text); border-color: var(--muted); }
.btn.danger { background: rgba(248,113,113,.1); color: var(--err); }
.btn.danger:hover { border-color: var(--err); }
.btn:disabled { opacity: .45; cursor: default; }
.btn.busy::after { content: '…'; }

/* tables */
.tblwrap { overflow-x: auto; margin-top: 12px; border: 1px solid var(--line-soft); border-radius: 8px; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th, td { text-align: left; padding: 6.5px 10px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
th { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); background: var(--panel-2); position: sticky; top: 0; }
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.02); }
td { color: var(--muted); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.acts { white-space: nowrap; }
td .mini {
  font-size: 11px; padding: 2.5px 9px; border-radius: 5px; border: 1px solid var(--line);
  color: var(--muted); margin-right: 4px;
}
td .mini:hover { color: var(--text); border-color: var(--muted); }
td .mini.sel { color: var(--accent); border-color: var(--accent-soft); }
td .mini.sel:hover { border-color: var(--accent); }
td .mini.del:hover { color: var(--err); border-color: var(--err); }
td img.thumb { height: 28px; border-radius: 4px; display: block; }
.b-yes { color: var(--ok); } .b-no { color: var(--err); }
.jsonpeek { font-family: var(--mono); font-size: 10.5px; color: var(--faint); cursor: pointer; }
.jsonpeek:hover { color: var(--accent); }
.rowcount { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-top: 8px; }
.pagbar { display: flex; gap: 8px; align-items: center; margin-top: 10px; }

.editpanel { margin-top: 12px; padding: 12px; border: 1px dashed var(--line); border-radius: 8px; background: var(--panel-2); }
.editpanel .ep-t { font-size: 12px; color: var(--accent); margin-bottom: 10px; font-family: var(--mono); }

.note { font-size: 11.5px; color: var(--muted); background: var(--panel-2); border-left: 2px solid var(--accent); padding: 7px 11px; border-radius: 0 6px 6px 0; margin-bottom: 12px; }

/* cascading tree columns */
.cols { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
.col { background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 8px; display: flex; flex-direction: column; min-height: 300px; max-height: 460px; }
.col > .ch { padding: 8px 11px; border-bottom: 1px solid var(--line-soft); display: flex; align-items: center; gap: 8px; }
.col > .ch .t { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); }
.col > .cl { overflow-y: auto; flex: 1; padding: 4px; }
.col .node {
  display: flex; align-items: center; gap: 6px;
  width: 100%; text-align: left;
  padding: 6px 8px; border-radius: 6px;
  color: var(--muted); font-size: 12.5px;
  cursor: pointer; user-select: none;
}
.col .node:hover { color: var(--text); background: rgba(255,255,255,.03); }
.col .node.on { color: var(--text); background: var(--accent-soft); }
.col .node .ord { font-family: var(--mono); font-size: 10px; color: var(--faint); min-width: 16px; }
.col .node .st { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: auto; }
.col .node .st.draft { color: var(--warn); background: rgba(251,191,36,.1); }
.col .node .st.published { color: var(--ok); background: rgba(52,211,153,.1); }
.col .nodebtns { display: none; gap: 3px; margin-left: auto; }
.col .node:hover .nodebtns { display: flex; }
.col .node .nb { font-size: 11px; color: var(--faint); padding: 1px 4px; border-radius: 4px; }
.col .node .nb:hover { color: var(--text); background: var(--panel); }
.col > .cf { padding: 7px; border-top: 1px solid var(--line-soft); display: flex; gap: 6px; }
.col > .cf input { font-size: 11.5px; }
.col .cempty { color: var(--faint); font-size: 11.5px; font-style: italic; padding: 14px 10px; }
.orderdirty { font-size: 10.5px; color: var(--warn); }

/* question type editors */
.qrows { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.qrow { display: flex; gap: 6px; align-items: center; }
.qrow input[type=text] { flex: 1; }
.qrow select { width: 110px; }
.qrow .num { width: 74px; }
.qrow .rm { color: var(--faint); font-size: 14px; padding: 0 5px; }
.qrow .rm:hover { color: var(--err); }
.qrow label.ck { display: flex; gap: 5px; align-items: center; font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ---------- console ---------- */
#console {
  grid-area: console;
  background: #0a0d12;
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column;
  height: 230px;
  transition: height .15s;
}
#console.closed { height: 33px; }
#console > .head {
  display: flex; align-items: center; gap: 12px;
  padding: 0 14px; min-height: 32px;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint);
  cursor: pointer; user-select: none;
}
#console > .head .last { text-transform: none; letter-spacing: 0; color: var(--muted); }
#console > .head .sp { margin-left: auto; }
#console > .head button { color: var(--faint); font-family: var(--mono); font-size: 10.5px; }
#console > .head button:hover { color: var(--text); }
#console > .list { overflow-y: auto; flex: 1; }
.centry { border-top: 1px solid var(--line-soft); font-family: var(--mono); font-size: 11.5px; }
.centry > .row { display: flex; gap: 10px; align-items: center; padding: 5px 14px; cursor: pointer; white-space: nowrap; }
.centry > .row:hover { background: rgba(255,255,255,.02); }
.centry .st { font-weight: 700; }
.centry .st.s2 { color: var(--ok); } .centry .st.s4, .centry .st.s5, .centry .st.s0 { color: var(--err); }
.centry .u { color: var(--muted); overflow: hidden; text-overflow: ellipsis; }
.centry .ms { color: var(--faint); margin-left: auto; }
.centry .who { color: var(--faint); }
.centry > .detail { display: none; padding: 4px 14px 12px; }
.centry.open > .detail { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.centry .detail h4 { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); margin: 6px 0 4px; }
.centry pre {
  background: var(--panel); border: 1px solid var(--line-soft); border-radius: 6px;
  padding: 8px 10px; overflow: auto; max-height: 220px;
  font-size: 11px; line-height: 1.45; color: #b6c2d6; white-space: pre-wrap; word-break: break-word;
}

/* ---------- modal ---------- */
#modalback {
  position: fixed; inset: 0; background: rgba(5,8,12,.7);
  display: none; align-items: flex-start; justify-content: center; padding-top: 10vh; z-index: 50;
}
#modalback.show { display: flex; }
#modal {
  background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  width: 420px; max-width: 94vw; max-height: 78vh; overflow-y: auto;
  padding: 18px 20px 20px;
}
#modal h3 { font-size: 15px; margin-bottom: 4px; }
#modal .sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
#modal .tabs { display: flex; gap: 4px; margin-bottom: 14px; border: 1px solid var(--line); border-radius: 8px; padding: 3px; }
#modal .tabs button { flex: 1; padding: 6px; border-radius: 6px; color: var(--muted); font-size: 12.5px; }
#modal .tabs button.on { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
#modal .frm { flex-direction: column; align-items: stretch; }
#modal .fld { max-width: 100%; }
.quick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.quick button { font-family: var(--mono); font-size: 10.5px; color: var(--faint); border: 1px dashed var(--line); border-radius: 6px; padding: 3px 8px; }
.quick button:hover { color: var(--accent); border-color: var(--accent); }

/* toast */
#toasts { position: fixed; bottom: 46px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 90; }
.toast {
  background: var(--panel-2); border: 1px solid var(--line); border-left: 3px solid var(--ok);
  border-radius: 8px; padding: 9px 14px; font-size: 12.5px; max-width: 380px;
  animation: tin .18s ease-out;
}
.toast.err { border-left-color: var(--err); }
@keyframes tin { from { transform: translateY(8px); opacity: 0; } }

/* landing */
.hero { padding: 8px 0 18px; }
.hero .big { font-size: 22px; font-weight: 600; }
.hero .big em { font-style: normal; color: var(--accent); }
.hero p { color: var(--muted); max-width: 640px; margin-top: 6px; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 18px; }
.card { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 10px; padding: 14px 16px; }
.card h4 { font-size: 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.card h4 .rdot { width: 9px; height: 9px; border-radius: 50%; }
.card p { color: var(--muted); font-size: 12px; }
.card .quick { margin-top: 10px; }

@media (max-width: 900px) {
  body { grid-template-columns: 170px 1fr; }
  .cols { grid-template-columns: 1fr; }
  .centry.open > .detail { grid-template-columns: 1fr; }
}
</style>
</head>
<body data-role="none">

<header id="topbar">
  <div id="brand"><span class="ar">نخبة الأوائل</span><span class="en">API Workbench</span></div>
  <div id="envswitch"></div>
  <button id="pingbtn" title="GET /api/ping"><span class="dot"></span>ping</button>
  <div id="sessions"></div>
</header>

<div id="ctxstrip"></div>
<nav id="nav"></nav>
<main id="main"></main>

<div id="console" class="closed">
  <div class="head" id="consolehead">
    <span>▸ Console</span>
    <span class="last" id="consolelast">no requests yet</span>
    <span class="sp"></span>
    <button id="consoleclear">clear</button>
  </div>
  <div class="list" id="consolelist"></div>
</div>

<div id="modalback"><div id="modal"></div></div>
<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
