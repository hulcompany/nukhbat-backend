<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Nukhba console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* ── tokens ───────────────────────────────────────────────────────────
   Method and status are the only colour in this UI. Everything else is
   neutral, so the eye lands on the two things you actually scan for. */
:root {
  --bg:#f7f7f6; --panel:#fff; --sunk:#f1f1ef; --line:#e2e2de; --line-2:#d2d2cc;
  --ink:#1b1d20; --mut:#71757c; --faint:#9a9ea5;
  --get:#1d63d1; --post:#137a45; --patch:#9a6100; --put:#6b32c4; --delete:#c2281f;
  --ok:#137a45; --bad:#c2281f;
  --admin:#6b32c4; --contentWriter:#0b6e83; --student:#a8530a;
  --focus:#1d63d1;
  --r:6px;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;
}
:root[data-theme="dark"] {
  --bg:#131519; --panel:#191c21; --sunk:#101216; --line:#282c33; --line-2:#393f48;
  --ink:#e4e6e9; --mut:#8d939c; --faint:#666c75;
  --get:#6fa2f5; --post:#4cc38a; --patch:#e0a33b; --put:#ab84ee; --delete:#f0776c;
  --ok:#4cc38a; --bad:#f0776c;
  --admin:#ab84ee; --contentWriter:#3fb6cf; --student:#e0913b;
  --focus:#6fa2f5;
}
@media (prefers-color-scheme:dark) {
  :root:not([data-theme="light"]) {
    --bg:#131519; --panel:#191c21; --sunk:#101216; --line:#282c33; --line-2:#393f48;
    --ink:#e4e6e9; --mut:#8d939c; --faint:#666c75;
    --get:#6fa2f5; --post:#4cc38a; --patch:#e0a33b; --put:#ab84ee; --delete:#f0776c;
    --ok:#4cc38a; --bad:#f0776c;
    --admin:#ab84ee; --contentWriter:#3fb6cf; --student:#e0913b;
    --focus:#6fa2f5;
  }
}

* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--ink);
  font:13px/1.5 var(--sans);
  display:grid; grid-template-rows:auto 1fr auto; height:100vh; overflow:hidden;
}
button,input,select,textarea { font:inherit; color:inherit; }
button { background:none; border:0; cursor:pointer; }
:focus-visible { outline:2px solid var(--focus); outline-offset:1px; border-radius:3px; }
.mono { font-family:var(--mono); }
.spacer { flex:1; }

/* ── header ─────────────────────────────────────────────────────────── */
header {
  display:flex; align-items:center; gap:10px; padding:0 12px; height:44px;
  background:var(--panel); border-bottom:1px solid var(--line);
}
.brand { font-weight:640; letter-spacing:-.02em; }
.brand span { color:var(--faint); font-weight:400; }
.seg { display:flex; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
.seg button { padding:4px 10px; font-size:12px; color:var(--mut); }
.seg button[aria-pressed="true"] { background:var(--sunk); color:var(--ink); font-weight:600; }
.seg button + button { border-left:1px solid var(--line); }
#prod-warn {
  display:none; font-size:10px; font-weight:700; letter-spacing:.08em;
  color:var(--bad); border:1px solid var(--bad); border-radius:var(--r); padding:2px 6px;
}
body[data-env="prod"] #prod-warn { display:block; }

/* session chips — the only place role colour appears */
#sessions { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.chip {
  display:flex; align-items:center; gap:6px; padding:3px 5px 3px 8px;
  border:1px solid var(--line); border-radius:99px; font-size:12px; color:var(--mut);
  max-width:200px;
}
.chip[aria-pressed="true"] {
  border-color:var(--role); color:var(--ink);
  background:color-mix(in srgb,var(--role) 9%,transparent);
}
.chip .dot { width:7px; height:7px; border-radius:99px; background:var(--role); flex:none; }
.chip .who { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chip .x { color:var(--faint); font-size:14px; line-height:1; padding:0 2px; }
.chip .x:hover { color:var(--bad); }
.ghost {
  border:1px solid var(--line); border-radius:var(--r); padding:4px 9px;
  font-size:12px; color:var(--mut);
}
.ghost:hover { border-color:var(--line-2); color:var(--ink); }

/* ── main grid ──────────────────────────────────────────────────────── */
main { display:grid; grid-template-columns:272px 1fr; min-height:0; }

/* ── sidebar ────────────────────────────────────────────────────────── */
#side {
  background:var(--panel); border-right:1px solid var(--line);
  display:flex; flex-direction:column; min-height:0;
}
#search {
  width:100%; padding:9px 12px; border:0; border-bottom:1px solid var(--line);
  background:transparent; font-size:12px;
}
#search::placeholder { color:var(--faint); }
#tree { overflow-y:auto; padding:4px 0 12px; flex:1; }
.folder > summary {
  list-style:none; cursor:pointer; padding:6px 12px;
  font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase;
  color:var(--faint); display:flex; align-items:center; gap:6px;
}
.folder > summary::-webkit-details-marker { display:none; }
.folder > summary:hover { color:var(--mut); }
.folder > summary::before { content:"▸"; font-size:9px; transition:transform .12s; }
.folder[open] > summary::before { transform:rotate(90deg); }
.folder > summary .n { margin-left:auto; font-weight:500; letter-spacing:0; }
.req {
  display:flex; align-items:center; gap:8px; width:100%; text-align:left;
  padding:5px 12px 5px 16px; color:var(--mut); font-size:12.5px;
  border-left:2px solid transparent;
}
.req:hover { background:var(--sunk); color:var(--ink); }
.req[aria-current="true"] { background:var(--sunk); color:var(--ink); border-left-color:var(--m); font-weight:550; }
.req .label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.verb {
  font:600 9.5px/1.4 var(--mono); letter-spacing:.04em; color:var(--m);
  flex:none; width:38px; text-align:right;
}

/* ── request pane ───────────────────────────────────────────────────── */
#work { display:flex; flex-direction:column; min-width:0; min-height:0; }
#bar {
  display:flex; align-items:center; gap:8px; padding:9px 12px;
  border-bottom:1px solid var(--line); background:var(--panel);
}
#bar .verb { width:auto; font-size:11px; letter-spacing:.06em; }
#url {
  flex:1; font-size:12px; color:var(--mut); overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap;
}
#url b { color:var(--ink); font-weight:600; }
#url i { color:var(--bad); font-style:normal; }
#send {
  background:var(--ink); color:var(--panel); padding:6px 16px;
  border-radius:var(--r); font-weight:600; font-size:12px;
}
#send:hover { opacity:.85; }
#send:disabled { opacity:.4; cursor:default; }

#tabs { display:flex; gap:2px; padding:0 12px; border-bottom:1px solid var(--line); background:var(--panel); }
#tabs button {
  padding:7px 10px; font-size:12px; color:var(--mut);
  border-bottom:2px solid transparent; margin-bottom:-1px;
}
#tabs button[aria-selected="true"] { color:var(--ink); border-bottom-color:var(--ink); font-weight:600; }
#tabs .badge {
  font:600 9px/1 var(--mono); background:var(--sunk); color:var(--mut);
  border-radius:99px; padding:2px 4px; margin-left:4px;
}

#panes { overflow:auto; background:var(--panel); flex:1; }
.pane { padding:12px; display:none; }
.pane[data-on] { display:block; }

.row { display:grid; grid-template-columns:18px 160px 1fr auto; gap:8px; align-items:center; margin-bottom:6px; }
.row input[type=text] {
  border:1px solid var(--line); border-radius:var(--r); padding:5px 8px;
  background:var(--bg); font-family:var(--mono); font-size:12px; min-width:0;
}
.row input[type=text]:focus { border-color:var(--focus); outline:none; }
.row .k { font-family:var(--mono); font-size:12px; color:var(--mut); overflow:hidden; text-overflow:ellipsis; }
.row .k em { color:var(--faint); font-style:normal; }
.req-mark { color:var(--bad); }
.hint { color:var(--faint); font-size:11.5px; margin-bottom:10px; }
.pick {
  border:1px solid var(--line); border-radius:var(--r); padding:4px 6px;
  font-size:10px; color:var(--mut); white-space:nowrap;
}
.pick:hover { border-color:var(--focus); color:var(--focus); }
.pick:disabled { opacity:.4; cursor:default; }
.file {
  border:1px dashed var(--line-2); border-radius:var(--r);
  padding:5px 8px; font-size:11.5px; color:var(--mut); cursor:pointer; text-align:left;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.file:hover { border-color:var(--focus); color:var(--ink); }
.file[data-has] { border-style:solid; color:var(--ink); }
textarea {
  width:100%; min-height:220px; border:1px solid var(--line); border-radius:var(--r);
  padding:10px; background:var(--bg); font-family:var(--mono); font-size:12px;
  line-height:1.6; resize:vertical; tab-size:2;
}
textarea:focus { border-color:var(--focus); outline:none; }
.docs { max-width:72ch; white-space:pre-wrap; color:var(--mut); font-size:12.5px; line-height:1.65; }
.docs b { color:var(--ink); font-weight:600; }
.docs code { color:var(--ink); font-family:var(--mono); font-size:11.5px; background:var(--sunk); padding:1px 4px; border-radius:3px; }
.empty { color:var(--faint); font-size:12px; padding:6px 0; }
.tools { display:flex; gap:6px; margin-bottom:8px; }

/* ── response ───────────────────────────────────────────────────────── */
#grip { height:5px; background:var(--bg); border-top:1px solid var(--line); cursor:row-resize; flex:none; }
#grip:hover { background:var(--line-2); }
#res { display:flex; flex-direction:column; min-height:90px; height:42%; background:var(--panel); flex:none; }
#res-bar { display:flex; align-items:center; gap:10px; padding:6px 12px; border-bottom:1px solid var(--line); }
#status { font:600 12px/1 var(--mono); color:var(--faint); }
#status[data-tone="ok"] { color:var(--ok); }
#status[data-tone="bad"] { color:var(--bad); }
#meta { color:var(--faint); font-size:11.5px; font-family:var(--mono); }
#body { overflow:auto; padding:10px 12px; flex:1; }
#body pre { font-family:var(--mono); font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
#body img { max-width:100%; border:1px solid var(--line); border-radius:var(--r); }
.t-key { color:var(--mut); }
.t-str { color:var(--post); }
.t-num { color:var(--put); }
.t-lit { color:var(--patch); }
.uuid {
  color:var(--get); text-decoration:underline; text-decoration-style:dotted;
  text-underline-offset:2px; cursor:pointer; font:inherit;
}
.uuid:hover { background:color-mix(in srgb,var(--get) 16%,transparent); border-radius:2px; }

/* ── id tray: catch an id from a response, paste it into the next request ── */
#tray {
  display:flex; align-items:center; gap:8px; padding:0 12px; height:38px;
  background:var(--panel); border-top:1px solid var(--line); overflow-x:auto;
}
#tray .cap { font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); flex:none; }
#tray .none { color:var(--faint); font-size:11.5px; }
.id {
  display:flex; align-items:center; gap:6px; flex:none;
  border:1px solid var(--line); border-radius:99px; padding:2px 4px 2px 9px; font-size:11px;
}
.id:hover { border-color:var(--focus); }
.id .src { color:var(--faint); white-space:nowrap; }
.id .val { font-family:var(--mono); color:var(--ink); }
.id .x { color:var(--faint); padding:0 3px; font-size:13px; line-height:1; }
.id .x:hover { color:var(--bad); }

/* ── toast ──────────────────────────────────────────────────────────── */
#toast {
  position:fixed; bottom:52px; left:50%; transform:translateX(-50%) translateY(6px);
  background:var(--ink); color:var(--panel); padding:7px 14px; border-radius:99px;
  font-size:12px; opacity:0; pointer-events:none; transition:opacity .16s,transform .16s;
  z-index:5; max-width:70vw; text-align:center;
}
#toast[data-on] { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── dialogs ────────────────────────────────────────────────────────── */
dialog {
  border:1px solid var(--line); border-radius:10px; padding:0; background:var(--panel);
  color:var(--ink); width:min(430px,92vw);
}
dialog::backdrop { background:rgba(0,0,0,.35); }
dialog h2 { font-size:14px; padding:14px 16px; border-bottom:1px solid var(--line); }
dialog .in { padding:16px; display:grid; gap:10px; }
dialog label { font-size:11px; color:var(--mut); display:grid; gap:4px; }
dialog input {
  border:1px solid var(--line); border-radius:var(--r); padding:7px 9px;
  background:var(--bg); font-size:13px;
}
dialog input:focus { border-color:var(--focus); outline:none; }
dialog .act { display:flex; justify-content:flex-end; gap:8px; padding:0 16px 16px; }
dialog .go { background:var(--ink); color:var(--panel); padding:7px 14px; border-radius:var(--r); font-weight:600; font-size:12px; }
dialog .go:disabled { opacity:.5; cursor:default; }
#login-err { color:var(--bad); font-size:12px; min-height:1.2em; }
#login-hint { color:var(--faint); font-size:11.5px; }

@media (max-width:860px) {
  main { grid-template-columns:1fr; }
  #side { display:none; }
}
@media (prefers-reduced-motion:reduce) { * { transition:none !important; } }
</style>
</head>
<body>

<header>
  <div class="brand">Nukhba <span>console</span></div>
  <div class="seg" id="env" role="group" aria-label="Environment"></div>
  <div id="prod-warn">LIVE</div>
  <div class="spacer"></div>
  <div id="sessions"></div>
  <button class="ghost" id="add-session">Sign in</button>
  <button class="ghost" id="theme" aria-label="Switch theme" title="Switch theme">◐</button>
</header>

<main>
  <nav id="side">
    <input id="search" placeholder="Search requests" autocomplete="off" spellcheck="false">
    <div id="tree"></div>
  </nav>

  <section id="work">
    <div id="bar">
      <span class="verb" id="verb"></span>
      <div id="url" class="mono"></div>
      <button id="send">Send</button>
    </div>
    <div id="tabs" role="tablist"></div>
    <div id="panes">
      <div class="pane" data-pane="path"></div>
      <div class="pane" data-pane="query"></div>
      <div class="pane" data-pane="body"></div>
      <div class="pane" data-pane="headers"></div>
      <div class="pane" data-pane="docs"></div>
    </div>

    <div id="grip" role="separator" aria-label="Resize response"></div>
    <div id="res">
      <div id="res-bar">
        <span id="status">Ready</span>
        <span id="meta"></span>
        <div class="spacer"></div>
        <button class="ghost" id="copy-res">Copy</button>
      </div>
      <div id="body"><div class="empty">Pick a request and send it.</div></div>
    </div>
  </section>
</main>

<div id="tray">
  <span class="cap">Caught ids</span>
  <div class="none">Click any id in a response to keep it here.</div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<dialog id="login">
  <h2>Sign in</h2>
  <div class="in">
    <label>Email <input type="email" id="li-email" autocomplete="off"></label>
    <label>Password <input type="password" id="li-pass" autocomplete="off"></label>
    <div id="login-hint"></div>
    <div id="login-err"></div>
  </div>
  <div class="act">
    <button class="ghost" id="li-cancel">Cancel</button>
    <button class="go" id="li-go">Sign in</button>
  </div>
</dialog>

<script src="collection.js"></script>
<script src="app.js"></script>
</body>
</html>
